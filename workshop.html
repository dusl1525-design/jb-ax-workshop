<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JB AX Mini 워크샵</title>
<style>
:root {
  --red: #C8102E;
  --red-light: #FDE7EA;
  --red-hover: #A00D24;
  --dark: #1A1A1A;
  --bg: #F5F5F5;
  --white: #FFFFFF;
  --gray: #888;
  --border: #E0E0E0;
  --gold: #D4A017;
  --green: #2E7D32;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ====== Header ====== */
.header {
  background: var(--dark);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header-title { color: var(--white); font-size: 16px; font-weight: 700; }
.header-badge {
  background: var(--red); color: var(--white);
  padding: 4px 14px; border-radius: 4px; font-size: 13px; font-weight: 600;
}
.header-back {
  color: var(--white); background: none; border: none;
  font-size: 14px; cursor: pointer; padding: 10px 16px;
  border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
  min-height: 44px; min-width: 44px;
}
.header-back:active { background: rgba(255,255,255,0.2); }

/* ====== Common ====== */
.container { max-width: 600px; margin: 0 auto; padding: 20px 16px 100px; }
.red-line { height: 4px; background: var(--red); margin-bottom: 20px; }
.page-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; line-height: 1.3; }
.page-sub { font-size: 14px; color: var(--gray); margin-bottom: 24px; line-height: 1.5; }
.step-badge {
  display: inline-block; background: var(--red); color: var(--white);
  padding: 4px 16px; border-radius: 4px; font-size: 13px; font-weight: 700;
  margin-bottom: 12px;
}

/* ====== Cards ====== */
.card {
  background: var(--white); border-radius: 12px;
  padding: 20px; margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.card-title {
  font-size: 16px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .num {
  background: var(--dark); color: var(--white);
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.q-label {
  font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 6px;
}
.q-hint { font-size: 12px; color: var(--gray); margin-bottom: 8px; font-style: italic; }

/* ====== Inputs ====== */
input[type="text"], textarea, select {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-family: inherit; font-size: 15px; color: var(--dark);
  background: var(--white); transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus, textarea:focus, select:focus {
  outline: none; border-color: var(--red);
}
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.input-label {
  font-size: 13px; font-weight: 600; color: var(--dark);
  margin-bottom: 6px; display: block;
}
.input-group { margin-bottom: 16px; }

/* ====== Scale ====== */
.scale-row { margin-bottom: 20px; }
.scale-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.scale-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray); margin-bottom: 4px; }
.scale-options { display: flex; gap: 0; }
.scale-btn {
  flex: 1; padding: 12px 0; text-align: center;
  border: 1.5px solid var(--border); background: var(--white);
  font-size: 16px; font-weight: 600; cursor: pointer; color: var(--dark);
  transition: all 0.2s;
}
.scale-btn:first-child { border-radius: 8px 0 0 8px; }
.scale-btn:last-child { border-radius: 0 8px 8px 0; }
.scale-btn.active { background: var(--red); color: var(--white); border-color: var(--red); }
.scale-btn:not(.active):hover { background: var(--red-light); }

/* ====== Buttons ====== */
.btn-primary {
  width: 100%; padding: 16px; background: var(--red); color: var(--white);
  border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: background 0.2s; font-family: inherit;
}
.btn-primary:hover { background: var(--red-hover); }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-secondary {
  width: 100%; padding: 14px; background: var(--white); color: var(--dark);
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all 0.2s; margin-bottom: 12px;
}
.btn-secondary:hover { border-color: var(--red); color: var(--red); }
.btn-secondary.selected { border-color: var(--red); background: var(--red-light); color: var(--red); }

/* ====== Voting ====== */
.vote-card {
  background: var(--white); border-radius: 14px;
  padding: 24px; margin-bottom: 14px;
  border: 2px solid var(--border); cursor: pointer;
  transition: all 0.25s; text-align: center;
}
.vote-card:hover { border-color: var(--red); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(200,16,46,0.12); }
.vote-card.voted { border-color: var(--red); background: var(--red-light); }
.vote-card .team-num { font-size: 40px; font-weight: 900; color: var(--red); }
.vote-card .team-name { font-size: 16px; font-weight: 600; margin-top: 4px; color: var(--dark); }
.vote-card .heart { font-size: 28px; margin-top: 8px; }
.vote-count { font-size: 13px; color: var(--gray); margin-top: 4px; }
.vote-remaining {
  text-align: center; padding: 12px; margin-bottom: 16px;
  background: var(--red-light); border-radius: 8px;
  font-size: 14px; font-weight: 600; color: var(--red);
}

/* ====== Progress ====== */
.progress-bar { display: flex; gap: 6px; margin-bottom: 24px; }
.progress-dot {
  flex: 1; height: 5px; border-radius: 3px; background: var(--border);
  transition: background 0.3s;
}
.progress-dot.active { background: var(--red); }
.progress-dot.done { background: var(--green); }

/* ====== Splash ====== */
.splash {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--dark); color: var(--white); text-align: center;
  padding: 40px 20px;
}
.splash h1 { font-size: 14px; font-weight: 400; color: var(--gray); margin-bottom: 12px; letter-spacing: 2px; }
.splash h2 { font-size: 40px; font-weight: 900; margin-bottom: 8px; line-height: 1.2; }
.splash h3 { font-size: 18px; font-weight: 400; color: var(--gray); margin-bottom: 40px; }
.splash-red { color: var(--red); }
.splash .btn-primary { max-width: 320px; margin-bottom: 16px; }
.splash .ft-link {
  color: var(--gray); font-size: 13px; cursor: pointer; text-decoration: underline;
  background: none; border: none; font-family: inherit; margin-top: 8px;
}

/* ====== FT Dashboard ====== */
.ft-team-card {
  background: var(--white); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 12px;
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.2s;
}
.ft-team-card:hover { border-color: var(--red); }
.ft-team-card .status {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
}
.status-submitted { background: #E8F5E9; color: var(--green); }
.status-pending { background: #FFF3E0; color: #E65100; }
.ft-detail-section { margin-bottom: 20px; }
.ft-detail-section h4 {
  font-size: 14px; font-weight: 700; color: var(--red);
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 2px solid var(--red);
}
.ft-detail-section p { font-size: 14px; line-height: 1.7; color: var(--dark); white-space: pre-wrap; }
.ft-scale-display { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.ft-scale-item {
  background: var(--bg); padding: 8px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
}
.ft-scale-item span { color: var(--red); font-weight: 800; font-size: 18px; }

.vote-bar-container { margin-bottom: 12px; }
.vote-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 14px; font-weight: 600; }
.vote-bar-bg { height: 32px; background: var(--bg); border-radius: 8px; overflow: hidden; position: relative; }
.vote-bar-fill {
  height: 100%; background: var(--red); border-radius: 8px;
  transition: width 0.6s ease; display: flex; align-items: center;
  padding-left: 10px; color: var(--white); font-size: 13px; font-weight: 700;
  min-width: 0;
}

/* ====== Toast ====== */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--dark); color: var(--white);
  padding: 12px 24px; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  z-index: 1000; animation: toastIn 0.3s ease;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ====== Bottom Nav ====== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid var(--border);
  padding: 12px 16px; z-index: 100;
  max-width: 600px; margin: 0 auto;
}

/* ====== Responsive ====== */
@media (max-width: 400px) {
  .page-title { font-size: 24px; }
  .container { padding: 16px 12px 100px; }
}

/* ====== Success Animation ====== */
.success-screen {
  text-align: center; padding: 60px 20px;
}
.success-icon { font-size: 64px; margin-bottom: 16px; animation: popIn 0.5s ease; }
@keyframes popIn {
  0% { transform: scale(0); }
  80% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* ====== Loading ====== */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 2000;
  display: flex; align-items: center; justify-content: center;
}
.loading-spinner {
  background: var(--white); border-radius: 16px; padding: 32px 40px;
  text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.loading-spinner .spin {
  width: 40px; height: 40px; border: 4px solid var(--border);
  border-top-color: var(--red); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ====== Connection Status ====== */
.conn-status {
  position: fixed; top: 0; left: 0; right: 0;
  text-align: center; font-size: 12px; font-weight: 600;
  padding: 4px; z-index: 200; transition: all 0.3s;
}
.conn-online { background: var(--green); color: var(--white); opacity: 0; pointer-events: none; }
.conn-offline { background: #E65100; color: var(--white); }
</style>
</head>
<body>

<div id="conn-status" class="conn-status conn-online"></div>
<div id="app"></div>

<!-- Firebase SDK (compat version for simple script tag usage) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
// ============ Firebase Config ============
const firebaseConfig = {
  apiKey: "AIzaSyACZTTEzdrqCz3LGO28R55WmbAboHmY5OY",
  authDomain: "jb-ax-20f08.firebaseapp.com",
  databaseURL: "https://jb-ax-20f08-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "jb-ax-20f08",
  storageBucket: "jb-ax-20f08.firebasestorage.app",
  messagingSenderId: "976277198033",
  appId: "1:976277198033:web:798ab4587958ef0dc721f0",
  measurementId: "G-6KRCSWG1RH"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============ Google Sheets Webhook (설정 후 URL 교체) ============
const SHEETS_WEBHOOK_URL = ''; // Google Apps Script 웹 앱 URL을 여기에 입력

// ============ Firebase Data Functions ============
// 캐시: 로컬에 Firebase 데이터를 미러링
let fbCache = {
  submissions: {},  // { clsIdx: { teamIdx: data } }
  votes: {},        // { clsIdx: { voterId: { teamIdx: scores } } }
  peers: {},        // { clsIdx: { reviewerId: data } }
};

// Firebase 경로 헬퍼
function fbPath(type, cls) {
  const clsKey = 'class_' + cls;
  return `workshop/${clsKey}/${type}`;
}

// ---- Submissions ----
function loadSubmissions() {
  if (state.cls === null) return {};
  return fbCache.submissions[state.cls] || {};
}

async function saveSubmission(teamIdx, data) {
  const path = fbPath('submissions', state.cls) + '/' + teamIdx;
  const payload = { ...data, submittedAt: new Date().toISOString() };
  try {
    await db.ref(path).set(payload);
    if (!fbCache.submissions[state.cls]) fbCache.submissions[state.cls] = {};
    fbCache.submissions[state.cls][teamIdx] = payload;
    // Google Sheets 백업
    sendToSheets('submission', { cls: state.cls, team: teamIdx, ...payload });
  } catch (e) {
    console.error('Firebase save error:', e);
    showToast('❌ 저장 실패. 네트워크를 확인하세요.');
  }
}

// ---- Votes ----
function loadVotes() {
  if (state.cls === null) return {};
  return fbCache.votes[state.cls] || {};
}

async function saveVote(voterId, scores) {
  const path = fbPath('votes', state.cls) + '/' + voterId;
  try {
    await db.ref(path).set(scores);
    if (!fbCache.votes[state.cls]) fbCache.votes[state.cls] = {};
    fbCache.votes[state.cls][voterId] = scores;
  } catch (e) {
    console.error('Firebase vote save error:', e);
    showToast('❌ 저장 실패. 네트워크를 확인하세요.');
  }
}

function getScoreSummary() {
  const all = loadVotes();
  const summary = {};
  for (let i = 0; i < 6; i++) {
    summary[i] = { s1: 0, s2: 0, s3: 0, s4: 0, total: 0, count: 0 };
  }
  Object.values(all).forEach(voterScores => {
    Object.entries(voterScores).forEach(([teamIdx, scores]) => {
      const t = parseInt(teamIdx);
      if (t >= 0 && t < 6 && scores && typeof scores === 'object') {
        summary[t].s1 += (scores.s1 || 0);
        summary[t].s2 += (scores.s2 || 0);
        summary[t].s3 += (scores.s3 || 0);
        summary[t].s4 += (scores.s4 || 0);
        summary[t].total += (scores.s1||0) + (scores.s2||0) + (scores.s3||0) + (scores.s4||0);
        summary[t].count++;
      }
    });
  });
  return summary;
}

function getTotalVoterCount() {
  return Object.keys(loadVotes()).length;
}

// ---- Peer Reviews ----
function loadPeerReviews() {
  if (state.cls === null) return {};
  return fbCache.peers[state.cls] || {};
}

async function savePeerReview(reviewerId, reviewData) {
  const path = fbPath('peers', state.cls) + '/' + reviewerId;
  const payload = { ...reviewData, submittedAt: new Date().toISOString() };
  try {
    await db.ref(path).set(payload);
    if (!fbCache.peers[state.cls]) fbCache.peers[state.cls] = {};
    fbCache.peers[state.cls][reviewerId] = payload;
  } catch (e) {
    console.error('Firebase peer save error:', e);
    showToast('❌ 저장 실패. 네트워크를 확인하세요.');
  }
}

// ---- Google Sheets 전송 ----
function sendToSheets(type, data) {
  if (!SHEETS_WEBHOOK_URL) return;
  try {
    fetch(SHEETS_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, ...data, timestamp: new Date().toISOString() })
    });
  } catch (e) {
    console.warn('Sheets webhook failed:', e);
  }
}

// ---- Firebase 실시간 리스너 ----
let activeListeners = [];
let renderTimer = null;
let listenersReady = false;

function scheduleRender() {
  if (renderTimer) return;
  renderTimer = setTimeout(() => {
    renderTimer = null;
    render();
  }, 100);
}

function setupFirebaseListeners(cls) {
  // 기존 리스너 해제
  activeListeners.forEach(unsub => unsub());
  activeListeners = [];
  listenersReady = false;

  const clsKey = 'class_' + cls;
  let loadCount = 0;

  function onDataLoaded() {
    loadCount++;
    if (loadCount >= 3) listenersReady = true;
    if (listenersReady) scheduleRender();
  }

  // Submissions 리스너
  const subRef = db.ref(`workshop/${clsKey}/submissions`);
  subRef.on('value', snap => {
    fbCache.submissions[cls] = snap.val() || {};
    onDataLoaded();
  });
  activeListeners.push(() => subRef.off());

  // Votes 리스너
  const voteRef = db.ref(`workshop/${clsKey}/votes`);
  voteRef.on('value', snap => {
    fbCache.votes[cls] = snap.val() || {};
    onDataLoaded();
  });
  activeListeners.push(() => voteRef.off());

  // Peers 리스너
  const peerRef = db.ref(`workshop/${clsKey}/peers`);
  peerRef.on('value', snap => {
    fbCache.peers[cls] = snap.val() || {};
    onDataLoaded();
  });
  activeListeners.push(() => peerRef.off());
}

// 연결 상태 감지
db.ref('.info/connected').on('value', snap => {
  const el = document.getElementById('conn-status');
  if (snap.val() === true) {
    el.className = 'conn-status conn-online';
    el.textContent = '';
  } else {
    el.className = 'conn-status conn-offline';
    el.textContent = '⚠ 오프라인 - 네트워크 연결을 확인하세요';
  }
});

// ============ Simple State Management ============
const CLASSES = ['1반', '2반', '3반', '4반', '5반'];
const TEAMS = ['Team 1', 'Team 2', 'Team 3', 'Team 4', 'Team 5', 'Team 6'];

let state = {
  screen: 'splash',
  cls: null,
  team: null,
  step: 0,
  data: {
    teamName: '', keyword: '', members: ['','','','','',''],
    roles: ['','','','','',''], checkin: '',
    q1: '', q2: '', q3: '',
    scale: [0,0,0,0,0], diagnosis: '',
    plans: [{area:'',tool:'',effect:'',time:'',who:''},{area:'',tool:'',effect:'',time:'',who:''},{area:'',tool:'',effect:'',time:'',who:''}],
    priority: '', reason: '', expected: '',
    ptPerson: '', ptTool: '',
    ptSlides: ['','','','','',''],
    protoType: '',
    protoPerson: '', protoTool: '',
    protoDesc: '', protoResult: '', protoLesson: '',
  },
  votes: [],
  toast: null,
  ftViewTeam: null,
  editMode: false,
  loading: false,
};

function getVoterId() {
  let id = localStorage.getItem('jb_voter_id');
  if (!id) { id = Math.random().toString(36).substr(2, 8); localStorage.setItem('jb_voter_id', id); }
  return 'voter_' + id;
}
function getReviewerId() {
  let id = localStorage.getItem('jb_reviewer_id');
  if (!id) { id = Math.random().toString(36).substr(2, 8); localStorage.setItem('jb_reviewer_id', id); }
  return 'peer_' + id;
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

function showLoading(msg) {
  state.loading = msg || '저장 중...';
  render();
}
function hideLoading() {
  state.loading = false;
  render();
}

function setState(updates) {
  Object.assign(state, updates);
  // 반이 변경되면 Firebase 리스너 설정
  if (updates.cls !== undefined && updates.cls !== null) {
    setupFirebaseListeners(updates.cls);
  }
  render();
}

// ============ Render Engine ============
function render() {
  try {
    const app = document.getElementById('app');
    if (!app) return;
    switch (state.screen) {
    case 'splash': app.innerHTML = renderSplash(); break;
    case 'classSelect': app.innerHTML = renderClassSelect(); break;
    case 'teamSelect': app.innerHTML = renderTeamSelect(); break;
    case 'worksheet': app.innerHTML = renderWorksheet(); break;
    case 'submitted': app.innerHTML = renderSubmitted(); break;
    case 'afternoon': app.innerHTML = renderAfternoon(); break;
    case 'allDone': app.innerHTML = renderAllDone(); break;
    case 'peerReview': app.innerHTML = renderPeerReview(); break;
    case 'editSelect': app.innerHTML = renderEditSelect(); break;
    case 'voting': app.innerHTML = renderVoting(); break;
    case 'voteDone': app.innerHTML = renderVoteDone(); break;
    case 'ftLogin': app.innerHTML = renderFtLogin(); break;
    case 'ftClassSelect': app.innerHTML = renderFtClassSelect(); break;
    case 'ftDashboard': app.innerHTML = renderFtDashboard(); break;
    case 'ftDetail': app.innerHTML = renderFtDetail(); break;
  }
  if (state.loading) {
    app.innerHTML += `<div class="loading-overlay"><div class="loading-spinner"><div class="spin"></div><div style="font-size:14px;font-weight:600">${state.loading}</div></div></div>`;
  }
  if (state.toast) {
    app.innerHTML += `<div class="toast">${state.toast}</div>`;
  }
  } catch (e) {
    console.error('Render error:', e);
  }
}

// ============ Screens ============
function renderSplash() {
  return `
    <div class="splash">
      <h1>JUNIOR BOARD</h1>
      <h2>AX Mini <span class="splash-red">워크샵</span></h2>
      <h3>팀 워크시트 & 투표</h3>
      <button class="btn-primary" onclick="setState({screen:'classSelect'})" style="font-size:18px">
        참가자 입장 →
      </button>
      <button class="ft-link" onclick="setState({screen:'ftLogin'})">FT(관리자) 입장</button>

function selectTeam(idx) {
  const subs = loadSubmissions();
  if (subs[idx]) {
    state.data = { ...state.data, ...subs[idx] };
    state.team = idx;
    if (subs[idx].protoDesc || subs[idx].ptPerson) {
      setState({ screen: 'editSelect', team: idx });
    } else {
      setState({ screen: 'worksheet', team: idx, step: 5 });
    }
  } else {
    setState({ screen: 'worksheet', team: idx, step: 0 });
  }
}

  return `

          : `${state.step > 0 ? `<button class="btn-secondary" onclick="prevStep()" style="flex:1;margin:0">← 이전</button>` : ''}

// ====== Peer Review ======
function renderPeerReview() {
  const reviewerId = getReviewerId();
  const allReviews = loadPeerReviews();
  const myReview = allReviews[reviewerId] || {};

  const subs = loadSubmissions();
  const teamData = subs[state.team] || state.data || {};
  const members = (teamData.members || []).filter(m => m.trim());

  const selfCriteria = [
    { key: 'ts1', label: '실현 가능성', max: 30, desc: '실무 적용 가능?' },
    { key: 'ts2', label: 'Prototype 완성도', max: 30, desc: '구체적 결과물?' },
    { key: 'ts3', label: '발표 명확성', max: 30, desc: '설득력 있는 설명?' },
    { key: 'ts4', label: '팀 참여도', max: 10, desc: '전원 적극 참여?' },
  ];

  const peerCriteria = [
    { key: 'participation', label: '참여도', desc: '팀 토론에 적극적으로 참여했다' },
    { key: 'responsibility', label: '책임감', desc: 'Case Study에서 맡은 역할을 잘 수행하였다' },
    { key: 'collaboration', label: '협업능력', desc: '모든 팀원들과 원활하게 협업하였다' },
  ];

  const selfScores = myReview.selfScores || {};
  const selfTotal = (selfScores.ts1||0) + (selfScores.ts2||0) + (selfScores.ts3||0) + (selfScores.ts4||0);
  const peerScores = myReview.peerScores || {};
  const reviewerName = myReview.reviewerName || '';

  return `
    ${renderHeader(CLASSES[state.cls] + ' · 상호 평가', true, 'goBackToAllDone')}
    <div class="container">
      <div class="red-line"></div>

      <div class="card" style="border-top:3px solid var(--red);margin-bottom:20px">
        <div class="input-group" style="margin-bottom:0">
          <label class="input-label" style="font-size:15px">✍️ 평가자 이름 (본인)</label>
          <input type="text" value="${esc(reviewerName)}"
                 oninput="updatePeerField('${reviewerId}', 'reviewerName', this.value)"
                 placeholder="본인 이름을 입력하세요" style="font-size:16px;font-weight:600">
        </div>
      </div>

      <div class="page-title" style="font-size:20px;margin-bottom:4px">🏆 본인 팀 자기 평가</div>
      <div class="page-sub">${TEAMS[state.team]} · 우리 팀의 결과물을 스스로 평가해주세요</div>

      <div class="card" style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <span style="font-size:15px;font-weight:700">총 100점</span>
          <span style="font-size:22px;font-weight:900;color:var(--red)">${selfTotal}점</span>
        </div>
        ${selfCriteria.map(c => `
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span style="font-size:13px;font-weight:600">${c.label} <span style="color:var(--gray);font-weight:400">${c.desc}</span></span>
              <span style="font-size:14px;color:var(--red);font-weight:700">${selfScores[c.key] !== undefined ? selfScores[c.key] : 0} / ${c.max}</span>
            </div>
            <input type="range" min="0" max="${c.max}" value="${selfScores[c.key] || 0}"
                   oninput="updateSelfScore('${reviewerId}', '${c.key}', parseInt(this.value))"
                   style="width:100%;accent-color:var(--red);height:28px">
          </div>
        `).join('')}
      </div>

      <div class="page-title" style="font-size:20px;margin-bottom:4px">👥 팀원 상호 평가</div>
      <div class="page-sub">함께한 팀원들을 평가해주세요 (5점 척도)</div>

      ${members.length > 0 ? members.map((member, mIdx) => {
        const ms = peerScores[mIdx] || {};
        return `
          <div class="card" style="margin-bottom:14px">
            <div class="card-title" style="margin-bottom:14px">
              <span class="num">${mIdx + 1}</span>
              <span style="font-size:16px;font-weight:800">${esc(member)}</span>
            </div>
            ${peerCriteria.map(c => `
              <div style="margin-bottom:12px">
                <div style="font-size:13px;font-weight:600;margin-bottom:2px">${c.label}</div>
                <div style="font-size:12px;color:var(--gray);margin-bottom:6px">${c.desc}</div>
                <div class="scale-options">
                  ${[1,2,3,4,5].map(v => `
                    <button class="scale-btn ${ms[c.key] === v ? 'active' : ''}"
                            onclick="updatePeerScore('${reviewerId}', ${mIdx}, '${c.key}', ${v})">${v}</button>
                  `).join('')}
                </div>

              </div>
            `).join('')}

                     oninput="updatePeerScore('${reviewerId}', ${mIdx}, 'comment', this.value)"
                     placeholder="이 팀원에게 한마디..." style="font-size:14px">
            </div>
          </div>
        `;
      }).join('') : `
        <div class="card" style="text-align:center;color:var(--gray);padding:30px">
          팀원 정보가 없습니다. 워크시트의 '팀 소개'에서 팀원 이름을 먼저 입력해주세요.

      <div style="margin-top:24px">

        </button>
        <div style="text-align:center;margin-top:12px">
          <button onclick="setState({screen:'voting'})"
                  style="font-size:13px;color:var(--gray);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline">
            건너뛰고 다른 팀 심사로 →
          </button>
        </div>
      </div>
    </div>
  `;
}

function updatePeerField(reviewerId, field, value) {
  const all = loadPeerReviews();
  if (!all[reviewerId]) all[reviewerId] = {};
  all[reviewerId][field] = value;
  all[reviewerId].teamIdx = state.team;
  all[reviewerId].cls = state.cls;
  // 로컬 캐시 업데이트 (즉시 반영, Firebase에는 제출 시 저장)
  if (!fbCache.peers[state.cls]) fbCache.peers[state.cls] = {};
  fbCache.peers[state.cls][reviewerId] = all[reviewerId];
}

function updateSelfScore(reviewerId, key, value) {
  const all = loadPeerReviews();
  if (!all[reviewerId]) all[reviewerId] = {};
  if (!all[reviewerId].selfScores) all[reviewerId].selfScores = {};
  all[reviewerId].selfScores[key] = value;
  all[reviewerId].teamIdx = state.team;
  if (!fbCache.peers[state.cls]) fbCache.peers[state.cls] = {};
  fbCache.peers[state.cls][reviewerId] = all[reviewerId];
  render();
}

function updatePeerScore(reviewerId, memberIdx, key, value) {
  const all = loadPeerReviews();
  if (!all[reviewerId]) all[reviewerId] = {};
  if (!all[reviewerId].peerScores) all[reviewerId].peerScores = {};
  if (!all[reviewerId].peerScores[memberIdx]) all[reviewerId].peerScores[memberIdx] = {};
  all[reviewerId].peerScores[memberIdx][key] = value;
  all[reviewerId].teamIdx = state.team;
  if (!fbCache.peers[state.cls]) fbCache.peers[state.cls] = {};
  fbCache.peers[state.cls][reviewerId] = all[reviewerId];
  if (key !== 'comment') render();
}

async function submitPeerReviewBtn(reviewerId) {
  const all = loadPeerReviews();
  const review = all[reviewerId] || {};
  if (!review.reviewerName) {
    showToast('❗ 평가자 이름을 입력해주세요');
    return;
  }
  review.submitted = true;
  review.teamIdx = state.team;
  showLoading('상호 평가 제출 중...');
  await savePeerReview(reviewerId, review);
  hideLoading();
  showToast('✅ 상호 평가가 제출되었습니다');
  setTimeout(() => setState({ screen: 'voting' }), 1000);
}

function goBackToAllDone() {

}

// ====== Voting ======
function renderVoting() {
  const subs = loadSubmissions();
  const voterId = getVoterId();
  const allVotes = loadVotes();
  const myScores = allVotes[voterId] || {};
  const myTeamIdx = state.team;

  const criteria = [
    { key: 's1', label: '실현 가능성', max: 30, desc: '실무 적용 가능?' },
    { key: 's2', label: 'Prototype 완성도', max: 30, desc: '구체적 결과물?' },
    { key: 's3', label: '발표 명확성', max: 30, desc: '설득력 있는 설명?' },
    { key: 's4', label: '팀 참여도', max: 10, desc: '전원 적극 참여?' },
  ];

  const scoredTeams = Object.keys(myScores).length;
  const totalTeams = myTeamIdx !== null ? 5 : 6;

  return `
    ${renderHeader(CLASSES[state.cls] + ' · 심사 투표', true, 'goBackToTeamSelect')}
    <div class="container">
      <div class="red-line"></div>
      <div class="page-title">📊 팀별 심사 투표</div>
      <div class="page-sub">각 팀의 발표를 듣고 항목별로 점수를 매겨주세요 (총 100점)</div>

      <div class="card" style="border-top:3px solid var(--red);margin-bottom:20px">
        <div style="font-size:14px;font-weight:800;margin-bottom:10px">📋 심사 기준 (총 100점)</div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          ${criteria.map(c => `
            <div style="flex:${c.max >= 30 ? 3 : 1};text-align:center;padding:8px 4px;background:var(--bg);border-radius:8px">
              <div style="font-size:20px;font-weight:900;color:var(--red)">${c.max}점</div>
              <div style="font-size:11px;font-weight:700;margin-top:2px">${c.label}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="vote-remaining">
        📝 채점 진행: <strong>${scoredTeams} / ${totalTeams}팀</strong> 완료
        ${scoredTeams >= totalTeams ? ' ✅' : ''}
      </div>

      ${TEAMS.map((name, i) => {
        const sub = subs[i];
        const teamName = sub ? (sub.teamName || name) : name;
        const planTitle = sub ? (sub.priority || '미제출') : '미제출';
        const ts = myScores[i] || {};
        const teamTotal = (ts.s1||0) + (ts.s2||0) + (ts.s3||0) + (ts.s4||0);
        const isMyTeam = myTeamIdx !== null && myTeamIdx === i;
        const hasScore = ts.s1 !== undefined;

        if (isMyTeam) {
          return `
            <div class="card" style="opacity:0.5;margin-bottom:14px">
              <div style="display:flex;align-items:center;gap:12px">
                <div style="font-size:28px;font-weight:900;color:var(--gray)">${String(i+1).padStart(2,'0')}</div>
                <div>
                  <div style="font-size:16px;font-weight:700;color:var(--gray)">${esc(teamName)}</div>
                  <div style="font-size:13px;color:var(--gray)">본인 팀 (채점 불가)</div>
                </div>
              </div>
            </div>
          `;
        }

        return `
          <div class="card" style="border:${hasScore?'2px solid var(--green)':'1px solid var(--border)'};margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <div style="display:flex;align-items:center;gap:10px">
                <div style="font-size:28px;font-weight:900;color:var(--red)">${String(i+1).padStart(2,'0')}</div>
                <div>
                  <div style="font-size:16px;font-weight:700">${esc(teamName)}</div>
                  <div style="font-size:12px;color:var(--gray)">${esc(planTitle)}</div>
                </div>
              </div>
              ${hasScore ? `<div style="text-align:center">
                <div style="font-size:24px;font-weight:900;color:var(--red)">${teamTotal}</div>
                <div style="font-size:11px;color:var(--gray)">/ 100</div>
              </div>` : ''}
            </div>
            
            ${criteria.map(c => `
              <div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                  <span style="font-size:13px;font-weight:600">${c.label}</span>
                  <span style="font-size:13px;color:var(--red);font-weight:700">${ts[c.key] !== undefined ? ts[c.key] : '-'} / ${c.max}</span>
                </div>
                <input type="range" min="0" max="${c.max}" value="${ts[c.key] || 0}"
                       oninput="updateScore('${voterId}', ${i}, '${c.key}', parseInt(this.value))"
                       style="width:100%;accent-color:var(--red);height:28px">
              </div>
            `).join('')}
          </div>
        `;
      }).join('')}

      ${scoredTeams >= totalTeams ? `
        <div style="margin-top:20px">
          <button class="btn-primary" onclick="submitVotes()" style="background:var(--green)">
            ✅ 채점 완료
          </button>
        </div>
      ` : ''}
    </div>
  `;
}

// 투표 점수 업데이트 (디바운스로 Firebase 저장)
let voteDebounceTimer = null;
function updateScore(voterId, teamIdx, criteriaKey, value) {
  const allVotes = loadVotes();
  if (!allVotes[voterId]) allVotes[voterId] = {};
  if (!allVotes[voterId][teamIdx]) allVotes[voterId][teamIdx] = {};
  allVotes[voterId][teamIdx][criteriaKey] = value;
  // 로컬 캐시 즉시 업데이트
  if (!fbCache.votes[state.cls]) fbCache.votes[state.cls] = {};
  fbCache.votes[state.cls] = allVotes;
  render();
  // 디바운스: 슬라이더 조작 중에는 저장 안 하고, 멈추면 저장
  clearTimeout(voteDebounceTimer);
  voteDebounceTimer = setTimeout(() => {
    saveVote(voterId, allVotes[voterId]);
  }, 800);
}

async function submitVotes() {
  const voterId = getVoterId();
  const allVotes = loadVotes();
  if (allVotes[voterId]) {
    showLoading('채점 저장 중...');
    await saveVote(voterId, allVotes[voterId]);
    hideLoading();
  }
  setState({ screen: 'voteDone' });
}

}

  const subs = loadSubmissions();
  const summary = getScoreSummary();

  const maxTotal = Math.max(...Object.values(summary).map(s => s.total), 1);

  return `
    ${renderHeader(CLASSES[state.cls] + ' · FT 대시보드', true, 'goFtClassSelect')}

        </div>

          <div style="font-size:32px;font-weight:900;color:var(--red)">${getTotalVoterCount()}</div>

          <div style="font-size:13px;color:var(--gray)">상호 평가</div>

      <div class="page-title" style="font-size:20px;margin-bottom:16px">팀별 워크시트</div>

        const sub = subs[i];

        return `
          <div class="ft-team-card" onclick="${sub ? `viewFtDetail(${i})` : ''}">

                <div style="font-size:16px;font-weight:700">${esc(teamName)}</div>

            </div>
            ${sub ? `<div style="font-size:13px;color:var(--gray);margin-top:8px">
              🏆 ${esc(sub.priority || '미입력')} · 키워드: ${esc(sub.keyword || '미입력')}
              ${sub.protoDesc ? ' · <span style="color:var(--green)">🛠 오후 실습 완료</span>' : ''}
            </div>` : ''}
          </div>
        `;
      }).join('')}

      <div class="page-title" style="font-size:20px;margin:32px 0 16px">📊 심사 점수 현황</div>
      <div style="font-size:13px;color:var(--gray);margin-bottom:16px">채점 참여: ${getTotalVoterCount()}명 · 팀별 합산 점수</div>
      ${TEAMS.map((name, i) => {
        const sub = subs[i];
        const teamName = sub ? (sub.teamName || name) : name;
        const s = summary[i];
        const pct = maxTotal > 0 ? Math.round(s.total / maxTotal * 100) : 0;
        const avg = s.count > 0 ? Math.round(s.total / s.count) : 0;
        return `
          <div class="vote-bar-container" style="margin-bottom:16px">
            <div class="vote-bar-label">

  `;
}

async function resetClassData() {
  if (!confirm(CLASSES[state.cls] + ' 데이터를 초기화합니다. 정말?')) return;
  const clsKey = 'class_' + state.cls;
  try {
    await db.ref(`workshop/${clsKey}`).remove();
    fbCache.submissions[state.cls] = {};
    fbCache.votes[state.cls] = {};
    fbCache.peers[state.cls] = {};
    showToast('초기화 완료');
    render();
  } catch (e) {
    showToast('❌ 초기화 실패');
  }
}

// ============ Header Helper ============
function renderHeader(title, showBack = false, backFn = null) {
  let backHandler;
  if (!backFn) {
    backHandler = `setState({screen:'splash'})`;
  } else if (typeof backFn === 'string') {
    backHandler = `${backFn}()`;
  } else {
    backHandler = `setState({screen:'splash'})`;
  }
  return `<div class="header">
    ${showBack ? `<button class="header-back" onclick="${backHandler}">← 뒤로</button>` : '<div></div>'}
    <span class="header-title">${title}</span>
    <span class="header-badge">JB AX</span>
  </div>`;
}

// ============ Data Handlers ============
function updateData(key, value) { state.data[key] = value; }
function updateArray(arrKey, idx, value) { state.data[arrKey][idx] = value; }
function updateScale(idx, value) { state.data.scale[idx] = value; render(); }
function updatePlan(idx, key, value) { state.data.plans[idx][key] = value; }
function updateSlide(idx, value) { state.data.ptSlides[idx] = value; }
function selectProtoType(id) { state.data.protoType = id; render(); }
function addPlan() {
  state.data.plans.push({area:'',tool:'',effect:'',time:'',who:''});
  render();
  setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 100);
}
function nextStep() {
  if (state.step < 6) { state.step++; render(); window.scrollTo(0, 0); }
}
function prevStep() {
  if (state.step > 0) { state.step--; render(); window.scrollTo(0, 0); }
}

async function submitMorning() {
  if (!state.data.priority) {
    showToast('❗ 최우선 Action Plan 제목을 입력해주세요');
    return;
  }
  showLoading('오전 워크시트 제출 중...');
  await saveSubmission(state.team, state.data);
  state.editMode = false;
  hideLoading();
  setState({ screen: 'submitted' });
}

async function saveAndReturn() {
  showLoading('저장 중...');
  await saveSubmission(state.team, state.data);
  state.editMode = false;
  hideLoading();
  showToast('✅ 저장되었습니다');
  setState({ screen: 'editSelect' });
}

function goAfternoon() {
  const subs = loadSubmissions();
  if (subs[state.team]) {
    state.data = { ...state.data, ...subs[state.team] };
  }
  setState({ screen: 'worksheet', step: 5 });
}

function goEditSelect() {
  const subs = loadSubmissions();
  if (subs[state.team]) {
    state.data = { ...state.data, ...subs[state.team] };
  }
  setState({ screen: 'editSelect' });
}

function goBackFromEdit() {
  const subs = loadSubmissions();
  const sub = subs[state.team] || {};
  const hasPM = sub.protoDesc || sub.ptPerson;
  setState({ screen: hasPM ? 'allDone' : 'submitted' });
}

function goBackFromWorksheet() {
  if (state.editMode) {
    saveSubmission(state.team, state.data);
    state.editMode = false;
    setState({ screen: 'editSelect' });
  } else {
    setState({ screen: 'teamSelect' });
  }
}

function editStep(stepNum) {
  state.editMode = true;
  setState({ screen: 'worksheet', step: stepNum });
}

async function submitAll() {
  showLoading('최종 제출 중...');
  await saveSubmission(state.team, state.data);
  state.editMode = false;
  hideLoading();
  setState({ screen: 'allDone' });
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============ Init ============
render();
</script>
